<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#667eea,#764ba2);
  height:100vh;
  overflow:hidden;
}

.bg-shape{
  position:absolute;
  width:350px;
  height:350px;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  filter:blur(50px);
  animation:float 10s infinite ease-in-out;
}

.bg1{
  top:5%;
  left:5%;
}

.bg2{
  bottom:5%;
  right:5%;
  animation-delay:4s;
}

@keyframes float{

  0%,100%{
    transform:translateY(0);
  }

  50%{
    transform:translateY(-30px);
  }

}

.card{
  border:none;
  border-radius:20px;
  backdrop-filter:blur(14px);
  background:rgba(255,255,255,0.12);
  color:white;
  animation:fadeIn 0.8s ease;
  box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

@keyframes fadeIn{

  from{
    opacity:0;
    transform:translateY(30px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }

}

h3{
  font-weight:600;
  letter-spacing:0.5px;
}

.form-floating input{
  border-radius:14px;
  border:none;
  background:rgba(255,255,255,0.2);
  color:white;
}

.form-floating input::placeholder{
  color:#eee;
}

.form-floating label{
  color:#ddd;
}

.form-control:focus{
  background:rgba(255,255,255,0.25);
  box-shadow:0 0 10px rgba(255,255,255,0.4);
}

.btn-custom{
  background:linear-gradient(135deg,#ff7eb3,#ff4e91);
  border:none;
  border-radius:14px;
  font-weight:600;
  padding:10px;
  transition:0.3s;
  box-shadow:0 5px 15px rgba(255,78,145,0.4);
}

.btn-custom:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(255,78,145,0.6);
}

.toggle-pass{
  position:absolute;
  right:15px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  color:#ccc;
}

a{
  color:#ffd6e0;
  text-decoration:none;
  font-weight:500;
}

a:hover{
  text-decoration:underline;
}

.logo{
  font-size:28px;
  text-align:center;
  margin-bottom:10px;
}

</style>

</head>

<body>

<div class="bg-shape bg1"></div>

<div class="bg-shape bg2"></div>

<div class="container d-flex justify-content-center align-items-center vh-100">

  <div class="card p-4" style="width:360px">

    <div class="logo">

      <i class="bi bi-shield-lock-fill"></i>

    </div>

    <h3 class="text-center mb-1">

      Welcome Back

    </h3>

    <p class="text-center small mb-4">

      Login to your account

    </p>

    <div class="form-floating mb-3">

      <input
        id="email"
        type="email"
        class="form-control"
        placeholder="Email"
      >

      <label>Email</label>

    </div>

    <div class="form-floating mb-3 position-relative">

      <input
        id="password"
        type="password"
        class="form-control"
        placeholder="Password"
      >

      <label>Password</label>

      <span
        class="toggle-pass"
        onclick="togglePassword()"
      >
        <i class="bi bi-eye-fill"></i>
      </span>

    </div>

    <button
      class="btn btn-custom w-100"
      onclick="login()"
    >
      Login
    </button>

    <p class="text-center mt-3 small">

      Don’t have an account?

      <a href="register.html">
        Register
      </a>

    </p>

  </div>

</div>

<div class="position-fixed top-0 end-0 p-3">

  <div id="toast" class="toast text-bg-danger border-0">

    <div class="d-flex">

      <div
        class="toast-body"
        id="toastMsg"
      ></div>

      <button
        class="btn-close btn-close-white me-2 m-auto"
        data-bs-dismiss="toast"
      ></button>

    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

function togglePassword(){

  const p=document.getElementById("password");

  if(p.type==="password"){

    p.type="text";

  }
  else{

    p.type="password";

  }

}

function showToast(msg){

  document.getElementById("toastMsg").innerText=msg;

  new bootstrap.Toast(
    document.getElementById("toast")
  ).show();

}

async function login(){

  try{

    const email = document.getElementById("email");
    const password = document.getElementById("password");

    const res = await fetch(
      "/login",
      {
        method: "POST",

        headers:{
          "Content-Type":"application/json"
        },

        body: JSON.stringify({
          email: email.value,
          password: password.value
        })
      }
    );

    const d = await res.json();

    console.log("LOGIN RESPONSE:", d);

    if(d.access_token){

      localStorage.setItem("token", d.access_token);
      localStorage.setItem("userid", d.userid);
      localStorage.setItem("role", d.role);

      if(d.role === "admin"){

        window.location.href = "admin.html";

      }else{

        window.location.href = "upload.html";

      }

    }else{

      showToast("Invalid email or password");

    }

  }catch(err){

    console.error(err);

    showToast("Server error. Try again.");

  }

}

</script>

</body>

</html>
