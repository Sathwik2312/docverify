<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Admin Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
  background:linear-gradient(135deg,#eef2ff,#f8fafc);
  font-family:"Poppins",sans-serif;
  min-height:100vh;
  transition:0.3s;
}

.navbar{
  background:linear-gradient(90deg,#0f172a,#1e293b);
  box-shadow:0 4px 20px rgba(0,0,0,0.2);
}

.navbar-brand{
  font-weight:600;
}

.main-card{
  border:none;
  border-radius:24px;
  background:white;
  box-shadow:0 10px 35px rgba(0,0,0,0.08);
  transition:0.3s;
}

.stats-card{
  border:none;
  border-radius:18px;
  transition:0.3s;
}

.stats-card:hover{
  transform:translateY(-3px);
}

.stats-icon{
  font-size:2rem;
}

.table{
  border-radius:14px;
  overflow:hidden;
}

.table thead{
  background:#111827;
  color:#fff;
}

.table td{
  vertical-align:middle;
}

.table-hover tbody tr{
  transition:0.25s;
}

.table-hover tbody tr:hover{
  background-color:#f3f6fb;
}

.badge{
  padding:7px 14px;
  border-radius:999px;
  font-size:0.75rem;
}

.btn{
  border-radius:12px;
  font-size:0.8rem;
  padding:7px 16px;
  font-weight:500;
}

.btn-success{
  background:linear-gradient(135deg,#22c55e,#16a34a);
  border:none;
}

.btn-danger{
  background:linear-gradient(135deg,#ef4444,#dc2626);
  border:none;
}

.action-btns{
  display:flex;
  justify-content:center;
  gap:10px;
}

.empty-state{
  text-align:center;
  padding:60px;
  color:#6b7280;
}

.empty-icon{
  font-size:45px;
  margin-bottom:12px;
}

.section-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* DARK MODE */

.dark-mode{
  background:#0f172a !important;
  color:white !important;
}

.dark-mode .main-card{
  background:#1e293b;
  color:white;
}

.dark-mode .card{
  background:#111827;
  color:white;
}

.dark-mode .table{
  color:white;
}

.dark-mode .table-hover tbody tr:hover{
  background:#334155;
}

.dark-mode .table thead{
  background:#020617;
}

.dark-mode .empty-state{
  color:#cbd5e1;
}

.dark-mode small{
  color:#cbd5e1;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark px-4">

  <span class="navbar-brand fs-5">

    <i class="bi bi-speedometer2 me-2"></i>

    DocVerify Admin

  </span>

  <div class="d-flex gap-2">

    <button
      class="btn btn-light btn-sm"
      onclick="toggleTheme()"
      id="themeBtn"
    >
      🌙
    </button>

    <button
      class="btn btn-outline-light btn-sm"
      onclick="logout()"
    >
      Logout
    </button>

  </div>

</nav>

<div class="container mt-5">

  <div class="main-card p-4">

    <div class="section-header mb-4">

      <div>

        <h3 class="mb-0">
          Documents Dashboard
        </h3>

        <small>
          Review and approve uploaded documents
        </small>

      </div>

    </div>

    <div class="row g-4 mb-4">

      <div class="col-md-3">

        <div class="card stats-card text-center p-4 shadow-sm">

          <div class="stats-icon text-primary">
            <i class="bi bi-files"></i>
          </div>

          <h6 class="mt-3">Total</h6>

          <h2 id="totalDocs">0</h2>

        </div>

      </div>

      <div class="col-md-3">

        <div class="card stats-card text-center p-4 shadow-sm">

          <div class="stats-icon text-success">
            <i class="bi bi-check-circle-fill"></i>
          </div>

          <h6 class="mt-3">Approved</h6>

          <h2 id="approvedDocs">0</h2>

        </div>

      </div>

      <div class="col-md-3">

        <div class="card stats-card text-center p-4 shadow-sm">

          <div class="stats-icon text-warning">
            <i class="bi bi-hourglass-split"></i>
          </div>

          <h6 class="mt-3">Pending</h6>

          <h2 id="pendingDocs">0</h2>

        </div>

      </div>

      <div class="col-md-3">

        <div class="card stats-card text-center p-4 shadow-sm">

          <div class="stats-icon text-danger">
            <i class="bi bi-x-circle-fill"></i>
          </div>

          <h6 class="mt-3">Rejected</h6>

          <h2 id="rejectedDocs">0</h2>

        </div>

      </div>

    </div>

    <table class="table table-hover align-middle">

      <thead>

        <tr>

          <th>Name</th>

          <th>Document</th>

          <th>Status</th>

          <th class="text-center">
            Action
          </th>

        </tr>

      </thead>

      <tbody id="table"></tbody>

    </table>

    <div id="empty" class="empty-state d-none">

      <div class="empty-icon">
        <i class="bi bi-folder-x"></i>
      </div>

      <h5>No documents found</h5>

      <p>
        Uploaded files will appear here
      </p>

    </div>

  </div>

</div>

<script>

function toggleTheme(){

  document.body.classList.toggle(
    "dark-mode"
  );

  const btn=document.getElementById(
    "themeBtn"
  );

  if(
    document.body.classList.contains(
      "dark-mode"
    )
  ){

    btn.innerText="☀️";

    localStorage.setItem(
      "theme",
      "dark"
    );

  }
  else{

    btn.innerText="🌙";

    localStorage.setItem(
      "theme",
      "light"
    );

  }

}

window.onload=()=>{

  const theme=localStorage.getItem(
    "theme"
  );

  if(theme==="dark"){

    document.body.classList.add(
      "dark-mode"
    );

    document.getElementById(
      "themeBtn"
    ).innerText="☀️";

  }

};

function logout(){

  localStorage.clear();

  window.location.href="login.html";

}

function getStatusBadge(status){

  if(status==="approved"){

    return `
      <span class="badge bg-success">
        Approved
      </span>
    `;

  }

  if(status==="rejected"){

    return `
      <span class="badge bg-danger">
        Rejected
      </span>
    `;

  }

  return `
    <span class="badge bg-warning text-dark">
      Pending
    </span>
  `;

}

async function load(){

  try{

    const token=localStorage.getItem("token");

    if(!token){

      logout();

      return;

    }

    const res=await fetch(
      "http://localhost:5000/all-documents",
      {
        method:"GET",

        headers:{
          "Authorization":`Bearer ${token}`
        }
      }
    );

    if(res.status===401){

      alert("Session expired");

      logout();

      return;

    }

    if(!res.ok){

      throw new Error("API failed");

    }

    const d=await res.json();

    document.getElementById(
      "totalDocs"
    ).innerText=d.total || 0;

    document.getElementById(
      "approvedDocs"
    ).innerText=d.approved || 0;

    document.getElementById(
      "pendingDocs"
    ).innerText=d.pending || 0;

    document.getElementById(
      "rejectedDocs"
    ).innerText=d.rejected || 0;

    const table=document.getElementById("table");

    const empty=document.getElementById("empty");

    table.innerHTML="";

    if(!d.data || d.data.length===0){

      empty.classList.remove("d-none");

      return;

    }

    empty.classList.add("d-none");

    d.data.forEach(x=>{

      table.innerHTML+=`

        <tr>

          <td>

            <strong>${x.name}</strong>

          </td>

          <td>

            ${x.doc_type}

          </td>

          <td>

            ${getStatusBadge(x.status)}

          </td>

          <td class="text-center">

            <div class="action-btns">

              <button
                class="btn btn-success btn-sm"
                onclick="verify(${x.docid},'approved')"
              >
                Approve
              </button>

              <button
                class="btn btn-danger btn-sm"
                onclick="verify(${x.docid},'rejected')"
              >
                Reject
              </button>

            </div>

          </td>

        </tr>

      `;

    });

  }
  catch(err){

    console.error("ADMIN ERROR:",err);

    alert("Failed to load documents");

  }

}

async function verify(id,status){

  try{

    const token=localStorage.getItem("token");

    const res=await fetch(
      "http://localhost:5000/verify",
      {
        method:"POST",

        headers:{
          "Content-Type":"application/json",
          "Authorization":`Bearer ${token}`
        },

        body:JSON.stringify({
          docid:id,
          status:status
        })
      }
    );

    if(res.status===401){

      alert("Session expired");

      logout();

      return;

    }

    load();

  }
  catch(err){

    console.error("VERIFY ERROR:",err);

    alert("Verification failed");

  }

}

load();

setInterval(async()=>{

  try{

    const token=localStorage.getItem("token");

    if(!token){

      logout();

      return;

    }

    const res=await fetch(
      "http://localhost:5000/all-documents",
      {
        method:"GET",

        headers:{
          "Authorization":`Bearer ${token}`
        }
      }
    );

    if(res.status===401){

      alert("Session expired. Login again");

      logout();

    }

  }
  catch(err){

    console.error("AUTO LOGOUT ERROR:",err);

  }

},5000);

</script>

</body>
</html>
