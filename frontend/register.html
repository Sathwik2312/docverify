<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
  <title>Register</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body{
      font-family:'Poppins',sans-serif;
      background: linear-gradient(135deg,#667eea,#764ba2);
      height:100vh;
      overflow:hidden;
    }

    .bg-shape{
      position:absolute;
      width:350px;
      height:350px;
      border-radius:50%;
      background:rgba(255,255,255,0.08);
      filter:blur(50px);
      animation: float 10s infinite ease-in-out;
    }

    .bg1{ top:5%; left:5%; }
    .bg2{ bottom:5%; right:5%; animation-delay:4s; }

    @keyframes float{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-30px); }
    }

    .card{
      border:none;
      border-radius:22px;
      backdrop-filter: blur(14px);
      background: rgba(255,255,255,0.12);
      color:white;
      animation: fadeIn 0.8s ease;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    }

    @keyframes fadeIn{
      from{opacity:0; transform:translateY(30px);}
      to{opacity:1; transform:translateY(0);}
    }

    h3{
      font-weight:600;
      letter-spacing:0.4px;
    }

    .form-floating input{
      border-radius:14px;
      border:none;
      background: rgba(255,255,255,0.2);
      color:white;
    }

    .form-floating input::placeholder{
      color:#eee;
    }

    .form-floating label{
      color:#ddd;
    }

    .form-control:focus{
      background: rgba(255,255,255,0.25);
      box-shadow:0 0 12px rgba(255,255,255,0.4);
    }

    .btn-custom{
      background: linear-gradient(135deg,#4facfe,#00f2fe);
      border:none;
      border-radius:14px;
      font-weight:600;
      padding:10px;
      transition:0.3s;
      box-shadow: 0 6px 18px rgba(0,242,254,0.4);
    }

    .btn-custom:hover{
      transform:translateY(-2px);
      box-shadow: 0 10px 25px rgba(0,242,254,0.6);
    }

    a{
      color:#ffd6e0;
      text-decoration:none;
      font-weight:500;
    }

    a:hover{
      text-decoration:underline;
    }

    .logo{
      font-size:30px;
      text-align:center;
      margin-bottom:8px;
    }

    .subtitle{
      color:#ddd;
    }
  </style>
</head>

<body>

<div class="bg-shape bg1"></div>
<div class="bg-shape bg2"></div>

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4" style="width:380px">

    <div class="logo">✨</div>

    <h3 class="text-center mb-1">Create Account</h3>
    <p class="text-center small subtitle mb-4">Join DocVerify</p>

    <div class="form-floating mb-3">
      <input id="name" type="text" class="form-control" placeholder="Name">
      <label>Full Name</label>
    </div>

    <div class="form-floating mb-3">
      <input id="email" type="email" class="form-control" placeholder="Email">
      <label>Email Address</label>
    </div>

    <div class="form-floating mb-3">
      <input id="password" type="password" class="form-control" placeholder="Password">
      <label>Password</label>
    </div>

    <button class="btn btn-custom w-100" onclick="register()">Create Account</button>

    <p class="text-center mt-3 small">
      Already have an account? <a href="login.html">Login</a>
    </p>

  </div>
</div>

<div class="position-fixed top-0 end-0 p-3">
  <div id="toast" class="toast text-bg-success border-0">
    <div class="d-flex">
      <div class="toast-body" id="toastMsg"></div>
      <button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
function showToast(msg){
  document.getElementById("toastMsg").innerText = msg;
  new bootstrap.Toast(document.getElementById("toast")).show();
}

async function register(){
  try{
    if(!name.value || !email.value || !password.value){
      showToast("All fields are required");
      return;
    }

    const res = await fetch("/register",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        name: name.value,
        email: email.value,
        password: password.value
      })
    });

    const d = await res.json();

    if(d.status==="success"){
      showToast("Registration successful");
      setTimeout(()=>location.href="login.html",1200);
    } else {
      showToast("Registration failed");
    }

  }catch(err){
    console.error(err);
    showToast("Server error. Try again.");
  }
}
</script>

</body>
</html>
