<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Status</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#667eea,#764ba2);
  min-height:100vh;
  overflow:hidden;
}

.bg-shape{
  position:absolute;
  width:350px;
  height:350px;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  filter:blur(50px);
  animation:float 10s infinite ease-in-out;
}

.bg1{
  top:5%;
  left:5%;
}

.bg2{
  bottom:5%;
  right:5%;
  animation-delay:4s;
}

@keyframes float{

  0%,100%{
    transform:translateY(0);
  }

  50%{
    transform:translateY(-30px);
  }

}

.navbar{
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(12px);
  box-shadow:0 4px 20px rgba(0,0,0,0.2);
}

.card{
  border:none;
  border-radius:24px;
  backdrop-filter:blur(16px);
  background:rgba(255,255,255,0.12);
  color:white;
  box-shadow:0 20px 60px rgba(0,0,0,0.25);
}

.table{
  color:white;
  border-radius:14px;
  overflow:hidden;
}

.table thead{
  background:rgba(0,0,0,0.6);
}

.table-hover tbody tr{
  transition:0.25s;
}

.table-hover tbody tr:hover{
  background:rgba(255,255,255,0.08);
}

.badge{
  padding:7px 14px;
  border-radius:999px;
  font-size:0.75rem;
}

.btn-primary{
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  padding:7px 16px;
  font-size:0.8rem;
  font-weight:500;
  transition:0.25s;
}

.btn-primary:hover{
  transform:translateY(-1px);
  opacity:0.92;
}

.empty{
  text-align:center;
  padding:50px;
  color:#ddd;
}

.empty-icon{
  font-size:42px;
  margin-bottom:12px;
}

.title{
  font-weight:600;
  letter-spacing:0.5px;
}

</style>

</head>

<body>

<div class="bg-shape bg1"></div>

<div class="bg-shape bg2"></div>

<nav class="navbar navbar-dark px-4">

  <span class="navbar-brand">

    <i class="bi bi-file-earmark-text-fill me-2"></i>

    My Documents

  </span>

  <button
    class="btn btn-outline-light btn-sm"
    onclick="logout()"
  >
    Logout
  </button>

</nav>

<div class="container d-flex justify-content-center align-items-center vh-100">

  <div class="card p-4" style="width:700px">

    <h3 class="text-center mb-4 title">

      Document Status

    </h3>

    <table class="table table-hover align-middle">

      <thead>

        <tr>

          <th>Type</th>

          <th>Status</th>

          <th>Download</th>

        </tr>

      </thead>

      <tbody id="table"></tbody>

    </table>

    <div id="empty" class="empty d-none">

      <div class="empty-icon">

        <i class="bi bi-folder-x"></i>

      </div>

      <h5>No documents uploaded</h5>

      <p>Your uploaded files will appear here</p>

    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

function logout(){

  localStorage.clear();

  window.location.href="login.html";

}

function badge(status){

  if(status==="approved"){

    return `
      <span class="badge bg-success">
        Approved
      </span>
    `;

  }

  if(status==="rejected"){

    return `
      <span class="badge bg-danger">
        Rejected
      </span>
    `;

  }

  return `
    <span class="badge bg-warning text-dark">
      Pending
    </span>
  `;

}

async function load(){

  try{

    const token=localStorage.getItem("token");

    if(!token){

      localStorage.clear();

      window.location.href="login.html";

      return;

    }

    const res=await fetch(
      "/documents",
      {
        method:"POST",

        headers:{
          "Authorization":`Bearer ${token}`,
          "Content-Type":"application/json"
        },

        body:JSON.stringify({})
      }
    );

    if(res.status===401){

      alert("Session expired");

      localStorage.clear();

      window.location.href="login.html";

      return;

    }

    if(!res.ok){

      throw new Error("API failed");

    }

    const data=await res.json();

    console.log("STATUS DATA:",data);

    const table=document.getElementById("table");

    const empty=document.getElementById("empty");

    table.innerHTML="";

    if(!data.data || data.data.length===0){

      empty.classList.remove("d-none");

      return;

    }

    empty.classList.add("d-none");

    data.data.forEach(doc=>{

      table.innerHTML+=`

        <tr>

          <td>

            ${doc.doc_type}

          </td>

          <td>

            ${badge(doc.status)}

          </td>

          <td>

            <button
              class="btn btn-primary btn-sm"
              onclick="downloadFile(${doc.docid})"
            >
              <i class="bi bi-download me-1"></i>

              Download

            </button>

          </td>

        </tr>

      `;

    });

  }
  catch(err){

    console.error("STATUS LOAD ERROR:",err);

    alert("Failed to load documents");

  }

}

async function downloadFile(id){

  try{

    const token=localStorage.getItem("token");

    const res=await fetch(
      `/download/${docid}`,
      {
        method:"GET",

        headers:{
          "Authorization":`Bearer ${token}`
        }
      }
    );

    if(res.status===401){

      alert("Session expired");

      localStorage.clear();

      window.location.href="login.html";

      return;

    }

    if(!res.ok){

      throw new Error("Download failed");

    }

    const blob=await res.blob();

    const url=window.URL.createObjectURL(blob);

    const a=document.createElement("a");

    a.href=url;

    a.download="document";

    document.body.appendChild(a);

    a.click();

    a.remove();

    window.URL.revokeObjectURL(url);

  }
  catch(err){

    console.error("DOWNLOAD ERROR:",err);

    alert("Download failed");

  }

}

load();

setInterval(async()=>{

  try{

    const token=localStorage.getItem("token");

    if(!token){

      localStorage.clear();

      window.location.href="login.html";

      return;

    }

    const res=await fetch(
      "/documents",
      {
        method:"POST",

        headers:{
          "Authorization":`Bearer ${token}`,
          "Content-Type":"application/json"
        },

        body:JSON.stringify({})
      }
    );

    if(res.status===401){

      alert("Session expired. Login again");

      localStorage.clear();

      window.location.href="login.html";

    }

  }
  catch(err){

    console.error("AUTO LOGOUT ERROR:",err);

  }

},5000);

</script>

</body>
</html>
