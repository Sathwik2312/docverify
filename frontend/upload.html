<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Upload</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#667eea,#764ba2);
  min-height:100vh;
  overflow:hidden;
}

.bg-shape{
  position:absolute;
  width:350px;
  height:350px;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  filter:blur(50px);
  animation:float 10s infinite ease-in-out;
}

.bg1{
  top:5%;
  left:5%;
}

.bg2{
  bottom:5%;
  right:5%;
  animation-delay:4s;
}

@keyframes float{

  0%,100%{
    transform:translateY(0);
  }

  50%{
    transform:translateY(-30px);
  }

}

.navbar{
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(12px);
  box-shadow:0 4px 20px rgba(0,0,0,0.2);
}

.card{
  border:none;
  border-radius:24px;
  backdrop-filter:blur(16px);
  background:rgba(255,255,255,0.12);
  color:white;
  box-shadow:0 20px 60px rgba(0,0,0,0.25);
}

.drop-zone{
  border:2px dashed rgba(255,255,255,0.5);
  border-radius:18px;
  padding:45px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}

.drop-zone:hover{
  background:rgba(255,255,255,0.08);
  transform:translateY(-2px);
}

.file-preview{
  margin-top:15px;
  padding:12px;
  border-radius:12px;
  background:rgba(255,255,255,0.1);
  font-size:0.9rem;
}

.btn-custom{
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  border:none;
  border-radius:14px;
  font-weight:600;
  padding:10px;
  transition:0.25s;
}

.btn-custom:hover{
  transform:translateY(-1px);
  opacity:0.92;
}

.upload-icon{
  font-size:52px;
}

.title{
  font-weight:600;
  letter-spacing:0.5px;
}

</style>

</head>

<body>

<div class="bg-shape bg1"></div>

<div class="bg-shape bg2"></div>

<nav class="navbar navbar-dark px-4">

  <span class="navbar-brand">

    <i class="bi bi-upload me-2"></i>

    Upload Document

  </span>

  <button
    class="btn btn-outline-light btn-sm"
    onclick="logout()"
  >
    Logout
  </button>

</nav>

<div class="container d-flex justify-content-center align-items-center vh-100">

  <div class="card p-4" style="width:450px">

    <h3 class="text-center mb-4 title">

      Upload File

    </h3>

    <div class="drop-zone" id="dropZone">

      <div class="upload-icon mb-3">

        <i class="bi bi-cloud-arrow-up-fill"></i>

      </div>

      <h5>

        Drag & Drop File

      </h5>

      <p class="mb-0">

        or click to browse

      </p>

      <input type="file" id="file" hidden>

      <div
        id="filePreview"
        class="file-preview d-none"
      ></div>

    </div>

    <button
      class="btn btn-custom w-100 mt-4"
      onclick="upload()"
    >
      <i class="bi bi-upload me-2"></i>

      Upload Document
    </button>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

function logout(){

  localStorage.clear();

  window.location.href="login.html";

}

const dropZone=document.getElementById("dropZone");

const fileInput=document.getElementById("file");

const preview=document.getElementById("filePreview");

dropZone.onclick=()=>{

  fileInput.click();

};

fileInput.addEventListener("change",()=>{

  if(fileInput.files.length){

    preview.classList.remove("d-none");

    preview.innerHTML=`

      <i class="bi bi-file-earmark-text me-2"></i>

      ${fileInput.files[0].name}

    `;

  }

});

async function upload(){

  try{

    if(!fileInput.files.length){

      alert("Please select a file");

      return;

    }

    const token=localStorage.getItem("token");

    if(!token){

      alert("Session expired");

      localStorage.clear();

      window.location.href="login.html";

      return;

    }

    const fd=new FormData();

    fd.append(
      "file",
      fileInput.files[0]
    );

    fd.append(
      "doc_type",
      "ID Proof"
    );

    const res=await fetch(
      "/upload",
      {
        method:"POST",

        headers:{
          "Authorization":`Bearer ${token}`
        },

        body:fd
      }
    );

    if(res.status===401){

      alert("Session expired");

      localStorage.clear();

      window.location.href="login.html";

      return;

    }

    const d=await res.json();

    console.log(d);

    if(
      d.status==="success" ||
      d.message==="Upload successful"
    ){

      alert("Upload successful");

      window.location.href="status.html";

    }
    else{

      alert("Upload failed");

    }

  }
  catch(err){

    console.error(err);

    alert("Server error");

  }

}

setInterval(async()=>{

  try{

    const token=localStorage.getItem("token");

    if(!token){

      localStorage.clear();

      window.location.href="login.html";

      return;

    }

    const res=await fetch(
      "/documents",
      {
        method:"POST",

        headers:{
          "Authorization":`Bearer ${token}`,
          "Content-Type":"application/json"
        }
      }
    );

    if(res.status===401){

      alert("Session expired. Login again");

      localStorage.clear();

      window.location.href="login.html";

    }

  }
  catch(err){

    console.error(err);

  }

},5000);

</script>

</body>
</html>
